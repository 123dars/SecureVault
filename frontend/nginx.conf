server {
    listen 80;
    
    # 1. Serve the React Application
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # This line is critical for React Router to work properly without throwing 404s
        try_files $uri $uri/ /index.html; 
    }

    # 2. Route API requests to the Python Backend
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 3. Route Auth requests to the Python Backend
    location /auth/ {
        proxy_pass http://backend:5000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
